# GitHub Actions workflow for Sri Rudra website
#
# What this does:
#   - On every push to main (and every pull request), spins up a clean
#     Ubuntu server with Node.js 24 (current LTS — Node 20 was deprecated
#     on GitHub Actions runners in September 2025)
#   - Installs dependencies (npm ci is faster and stricter than npm install)
#   - Runs `npm run build` to verify the site actually compiles
#   - Uploads the built `out/` directory as an artifact you can download
#
# Why this is useful:
#   - Catches broken code before it reaches production
#   - The green ✓ badge on commits tells you (and anyone else) the build
#     was successful at that point in history
#   - The `out/` artifact is ready to upload to any static host
#     (or use the Vercel/Netlify/Cloudflare one-click deploy instead)

name: Build

on:
  # Run on every push to main branch
  push:
    branches: [main]
  # Also run on every pull request targeting main
  pull_request:
    branches: [main]

# Cancel any in-progress runs for the same branch when a new push comes in
# (saves your free 2,000 min/month by not running stale builds)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Global env: allow Node 20 if anyone reverts to it; harmless on Node 24
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  build:
    # Run on the latest Ubuntu; this is GitHub's free Linux VM
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code from your repo at the commit being tested.
      #    @v4 is the current major; pin the action to a commit SHA in
      #    production-critical repos (we keep v4 here for readability).
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history so actions/setup-node's cache can hash it
          fetch-depth: 0

      # 2. Set up Node.js. We pin to Node 24 because:
      #      - GitHub deprecated Node 20 on ubuntu-latest runners in
      #        September 2025
      #      - Node 24 (current LTS) is fully backward-compatible with our
      #        code (Next.js 15.5+, React 19, TypeScript 5)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # Cache node_modules between runs for faster builds
          cache: 'npm'

      # 3. Install dependencies from package-lock.json (reproducible).
      #    If a peer dependency conflict ever resurfaces, fall back to:
      #      npm ci --legacy-peer-deps
      - name: Install dependencies
        run: npm ci

      # 4. Run the production build.
      #    Runs TypeScript type-check + Next.js build.
      #    Output goes to the `out/` directory (because output: 'export').
      - name: Build site
        run: npm run build

      # 5. Upload the built static site as a downloadable artifact.
      #    After the workflow runs, you can download this from the
      #    Actions tab and upload it to any static host.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sri-rudra-out
          path: out/
          # Keep for 30 days (free tier limit); increase if you have GH Pro
          retention-days: 30
