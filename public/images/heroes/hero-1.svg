<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abstract healing light">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="55%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#5EEAD4" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="80%" r="45%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#ffffff" fill-opacity="0.07"/>
    </pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#g1)"/>
  <rect width="1600" height="900" fill="url(#dots)"/>
  <rect width="1600" height="900" fill="url(#glow1)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>
  <g opacity="0.6" filter="url(#soft)">
    <circle cx="1300" cy="160" r="120" fill="#5EEAD4"/>
    <circle cx="200" cy="780" r="160" fill="#22D3EE"/>
  </g>
  <g fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.2">
    <path d="M0 620 Q400 540 800 620 T1600 580"/>
    <path d="M0 700 Q400 620 800 700 T1600 660"/>
  </g>
</svg>
